# 지속적 통합(CI) 설정 파일
# 프로젝트의 테스트 및 코드 품질 검사를 자동으로 실행함.
# 일반적으로 코드를 푸시하거나 PR을 생성할 때 실행됨.

name: CI

on:
  push:
    branches:
      - '4.x'
      - '4.next'
      - '5.x' # 지정된 branch에 푸시될 때 실행
  pull_request:
    branches:
      - '*' # 모든 branch의 PR에서 실행
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: read # 저장소 내용을 읽을 수 있도록 설정

jobs:
  testsuite:
    runs-on: ubuntu-22.04 # 최신 우분투 환경에서 실행
    strategy:
      fail-fast: false # 첫 번째 실패 후 즉시 중단하지 않음
      matrix:
        php-version: ['8.1', '8.3'] # 테스트할 PHP 버전
        dependencies: ['highest'] # 의존성 버전 설정
        include:
          - php-version: '8.1'
            dependencies: 'lowest' # 가장 낮은 의존성 버전 테스트
          - php-version: '8.4'
            dependencies: 'highest'
            composer-options: '--ignore-platform-req=php' # PHP 버전 요구사항 무시

    steps:
    - uses: actions/checkout@v6 # 저장소 체크아웃

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, pdo_sqlite # 필요한 확장 기능 로드
        ini-values: zend.assertions=1 # Zend assertions 활성화
        coverage: none

    - name: Composer install
      uses: ramsey/composer-install@v3
      with:
        dependency-versions: ${{ matrix.dependencies }}
        composer-options: ${{ matrix.composer-options }}

    - name: Composer post install
      run: composer run-script post-install-cmd --no-interaction

    - name: Run PHPUnit
      run: vendor/bin/phpunit
      env:
        DATABASE_TEST_URL: sqlite://./testdb.sqlite # SQLite 테스트 데이터베이스 설정

  coding-standard:
    name: Coding Standard & Static Analysis
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v6 # 저장소 체크아웃

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, intl
        coverage: none
        tools: cs2pr, phpstan:1.12 # 코드 스타일 검사 도구 추가

    - name: Composer install
      uses: ramsey/composer-install@v3

    - name: Run PHP CodeSniffer
      run: vendor/bin/phpcs --report=checkstyle | cs2pr

    - name: Run phpstan
      if: always()
      # 항상 실행되도록 설정
      run: phpstan
      env:
        SECURITY_SALT: f76f1c8475585c46c6acd3ddcb8f5e0f15de524637bb4080a08c4afe7cfc9144
